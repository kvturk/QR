<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Kalite Kontrol V9.0</title>
    <!-- jsQR - Dinamik yükleme ile çoklu CDN desteği -->
    <script>
        (function() {
            const cdnList = [
                "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js",
                "https://unpkg.com/jsqr@1.4.0/dist/jsQR.js",
                "https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"
            ];
            let idx = 0;
            function loadNext() {
                if (idx >= cdnList.length) {
                    console.error("jsQR hiçbir CDN'den yüklenemedi!");
                    return;
                }
                const sc = document.createElement('script');
                sc.src = cdnList[idx++];
                sc.onerror = loadNext;
                document.head.appendChild(sc);
            }
            loadNext();
        })();
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #fdf5e6; color: #5d4037; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid #d4af37; text-align: center; width: 100%; max-width: 380px; }
        h2 { color: #8b4513; margin-bottom: 5px; }
        .input-group { margin: 12px 0; text-align: left; }
        label { font-size: 0.75rem; color: #8b4513; font-weight: bold; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; text-align: center; }
        #manualSerial { font-weight: bold; letter-spacing: 2px; color: #8b4513; background-color: #fffaf0; border: 2px solid #d4af37; text-transform: uppercase; }
        button.main-btn { width: 100%; padding: 15px; background-color: #d4af37; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 8px; transition: background 0.2s; }
        button.main-btn:active { background-color: #b8962e; }

        /* KAMERA ALANI */
        #cameraSection { margin: 12px 0; display: none; }
        #cameraToggleBtn { width: 100%; padding: 13px; background: #5d4037; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
        #cameraToggleBtn:active { background: #3e2723; }
        #cameraToggleBtn.active { background: #c62828; }

        .scanner-wrapper { position: relative; width: 100%; border-radius: 14px; overflow: hidden; background: #000; margin-top: 10px; }
        #videoEl { width: 100%; display: block; border-radius: 14px; }
        #canvasEl { display: none; }

        /* Tarama çizgisi animasyonu */
        .scan-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #d4af37, transparent); animation: scanMove 2s linear infinite; box-shadow: 0 0 8px #d4af37; }
        @keyframes scanMove { 0% { top: 5%; } 100% { top: 95%; } }

        /* Köşe çerçevesi */
        .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; aspect-ratio: 1; }
        .scan-frame::before, .scan-frame::after, .scan-frame span::before, .scan-frame span::after {
            content: ''; position: absolute; width: 22px; height: 22px; border-color: #d4af37; border-style: solid;
        }
        .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scan-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .scan-frame span::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

        /* Başarılı okuma flash efekti */
        .scanner-wrapper.flash { animation: flashGreen 0.4s ease-out; }
        @keyframes flashGreen { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 0 4px #4caf50; } }

        #scanStatus { font-size: 0.78rem; color: #8b4513; margin-top: 6px; min-height: 18px; font-weight: bold; }
        #cooldownBar { width: 0%; height: 4px; background: #d4af37; border-radius: 2px; margin-top: 4px; transition: width linear; }

        #result { margin-top: 20px; font-weight: bold; font-size: 1.05rem; line-height: 1.6; }
        .session-info { font-size: 0.8rem; color: #2e7d32; margin-bottom: 10px; font-weight: bold; background: #e8f5e9; padding: 10px; border-radius: 10px; }
        .logout-btn { background: none; color: #8b4513; font-size: 0.7rem; text-decoration: underline; margin-top: 15px; border: none; cursor: pointer; width: auto; padding: 5px; }
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 10px; margin: 12px 0 0; height: 20px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; text-align: center; line-height: 20px; color: white; font-size: 12px; font-weight: bold; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>
<div class="card">
    <h2>Royal Pastanesi</h2>
    <div style="font-size:0.75rem; color:#d4af37; letter-spacing:1px; margin-bottom:12px; font-weight:bold;">ROYAL KK V9.0 (KAMERA MODLU)</div>

    <div id="authFields">
        <div class="input-group">
            <label>PERSONEL ADI</label>
            <input type="text" id="staffName" placeholder="Ad Soyad" autocomplete="off" maxlength="30"
                   oninput="this.value = this.value.replace(/[^a-zA-ZçÇğĞıİöÖşŞüÜ\s]/g, '')">
        </div>
        <div class="input-group">
            <label>SİSTEM ŞİFRESİ</label>
            <input type="password" id="pwd" placeholder="****">
        </div>
    </div>

    <div id="sessionStatus" class="session-info" style="display:none;"></div>

    <!-- KAMERA BUTONU -->
    <button id="cameraToggleBtn" onclick="toggleCamera()">
        <span>📷</span> <span id="cameraToggleText">Kamerayı Aç (QR Tara)</span>
    </button>

    <!-- KAMERA ALANI -->
    <div id="cameraSection">
        <div class="scanner-wrapper" id="scannerWrapper">
            <video id="videoEl" autoplay playsinline muted></video>
            <canvas id="canvasEl"></canvas>
            <div class="scan-line"></div>
            <div class="scan-frame"><span></span></div>
        </div>
        <div id="scanStatus">📡 QR kod aranıyor...</div>
        <div id="cooldownBar"></div>
    </div>

    <!-- MANUEL GİRİŞ -->
    <div class="input-group" style="margin-top:12px;">
        <label>SERİ NO (MANUEL)</label>
        <input type="text" id="manualSerial" placeholder="Örn: P852319" maxlength="7"
               oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '')">
    </div>

    <button class="main-btn" onclick="processAll()">KONTROLÜ BAŞLAT</button>

    <div id="result"></div>

    <div id="lifeBarContainer" class="progress-container">
        <div id="lifeBar" class="progress-bar" style="width:0%"></div>
    </div>

    <button id="logoutBtn" class="logout-btn" onclick="clearSession(true)" style="display:none;">Vardiyayı Kapat (Oturumu Sil)</button>
</div>

<script>
    // --- GİZLİ AYARLAR ---
    const SECRET_CONFIG = {
        botToken: "8280174252:AAHkcwG-VpWnHi1B3qGj5rrDLh9OurXTeQ4",
        chatId: "924832074",
        key: "MjAyNnJveWFs",
        sheetUrl: "https://script.google.com/macros/s/AKfycbyZlvvJkdRBFJAhf0GLXuWLCfhpXnrCsahnZ9SizJ_fp4k8vEFbYa625fH262woftOP/exec"
    };

    const SUBELER = [
        { ad: "Gümbet Şube",   lat: 37.0389, lon: 27.4118 },
        { ad: "Gümbet 2 Şube", lat: 37.0378, lon: 27.4042 },
        { ad: "Konacık Şube",  lat: 37.0463, lon: 27.4003 },
        { ad: "Kumbahçe Şube", lat: 37.0325, lon: 27.4393 }
    ];

    // --- KAMERA DEĞİŞKENLERİ ---
    let cameraStream = null;
    let scannerActive = false;
    let scanCooldown = false;   // Tekrar okumayı engelle
    let scanLoopId = null;
    let globalLocation = null;  // Konum bir kere alınsın

    // =================== OTURUM ===================
    window.onload = function() {
        checkSession(false);
        // Sayfa yüklenince konumu arka planda al
        navigator.geolocation.getCurrentPosition(pos => {
            globalLocation = pos.coords;
        }, null, { enableHighAccuracy: true });
    };

    function checkSession(forceClear = false) {
        const sessionStr = localStorage.getItem('royal_session');
        if (!sessionStr) return null;
        const session = JSON.parse(sessionStr);
        const isExpired = (Date.now() - session.time > 3600000);
        if (session && !isExpired && !forceClear) {
            document.getElementById('authFields').style.display = 'none';
            document.getElementById('sessionStatus').style.display = 'block';
            document.getElementById('sessionStatus').textContent = "👤 Personel: " + session.name;
            document.getElementById('logoutBtn').style.display = 'inline-block';
            return session;
        } else if (isExpired || forceClear) {
            clearSession(true);
        }
        return null;
    }

    function clearSession(resetInputs = true) {
        localStorage.removeItem('royal_session');
        stopCamera();
        document.getElementById('authFields').style.display = 'block';
        document.getElementById('sessionStatus').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('lifeBarContainer').style.display = 'none';
        document.getElementById('result').innerHTML = "";
        if (resetInputs) {
            document.getElementById('staffName').value = "";
            document.getElementById('pwd').value = "";
        }
    }

    // =================== KAMERA ===================
    async function toggleCamera() {
        if (scannerActive) {
            stopCamera();
        } else {
            await startCamera();
        }
    }

    async function startCamera() {
        const btn = document.getElementById('cameraToggleBtn');
        const section = document.getElementById('cameraSection');

        // jsQR yüklü mü?
        if (typeof jsQR === 'undefined') {
            alert("jsQR kütüphanesi yüklenemedi! İnternet bağlantınızı kontrol edin.");
            return;
        }

        try {
            // Önce arka kamerayı dene, olmadıysa herhangi bir kamerayı aç
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: 'environment' } }
                });
            } catch(e) {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
            }

            const video = document.getElementById('videoEl');
            video.srcObject = cameraStream;
            await video.play();

            section.style.display = 'block';
            btn.classList.add('active');
            btn.innerHTML = '<span>🔴</span> <span>Kamerayı Kapat</span>';
            scannerActive = true;
            document.getElementById('scanStatus').textContent = "📡 QR kod aranıyor...";
            scanLoop();
        } catch (e) {
            alert("Kamera hatası: " + e.message);
        }
    }

    function stopCamera() {
        scannerActive = false;
        if (scanLoopId) cancelAnimationFrame(scanLoopId);
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
        document.getElementById('cameraSection').style.display = 'none';
        const btn = document.getElementById('cameraToggleBtn');
        btn.classList.remove('active');
        btn.innerHTML = '<span>📷</span> <span>Kamerayı Aç (QR Tara)</span>';
    }

    function scanLoop() {
        if (!scannerActive) return;
        const video = document.getElementById('videoEl');
        const canvas = document.getElementById('canvasEl');
        const ctx = canvas.getContext('2d');

        // Video hazır mı ve boyutu var mı?
        if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            // jsQR yüklü mü kontrol et
            if (typeof jsQR === 'undefined') {
                document.getElementById('scanStatus').textContent = "❌ jsQR kütüphanesi yüklenemedi!";
                return;
            }

            const code = jsQR(imageData.data, canvas.width, canvas.height, {
                inversionAttempts: "attemptBoth" // hem normal hem ters dene
            });

            if (code && !scanCooldown) {
                const raw = code.data.trim();
                document.getElementById('scanStatus').textContent = "🔎 Tespit: " + raw.substring(0, 30);

                // Seri numarasını bulmaya çalış
                let seri = "";

                // 1. URL içinde ?s= parametresi var mı?
                try {
                    const url = new URL(raw);
                    const param = url.searchParams.get('s');
                    if (param) seri = param.toUpperCase();
                } catch(e) {}

                // 2. Direkt 7 haneli seri no mu?
                if (!seri) {
                    const temiz = raw.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (temiz.length === 7 && /^[PS]/.test(temiz)) {
                        seri = temiz;
                    }
                }

                // 3. Metin içinde P veya S ile başlayan 7 haneli bir şey var mı?
                if (!seri) {
                    const match = raw.toUpperCase().match(/[PS][A-Z0-9]{6}/);
                    if (match) seri = match[0];
                }

                if (seri && seri.length === 7) {
                    onQRDetected(seri);
                }
            }
        } else {
            // Video henüz hazır değil, statusü göster
            document.getElementById('scanStatus').textContent = "⏳ Kamera başlatılıyor...";
        }

        scanLoopId = requestAnimationFrame(scanLoop);
    }

    function onQRDetected(seri) {
        scanCooldown = true;
        document.getElementById('scanStatus').textContent = "✅ Okundu: " + seri;
        document.getElementById('manualSerial').value = seri;

        // Flash animasyonu
        const wrapper = document.getElementById('scannerWrapper');
        wrapper.classList.add('flash');
        setTimeout(() => wrapper.classList.remove('flash'), 400);

        // Titreşim (varsa)
        if (navigator.vibrate) navigator.vibrate(100);

        // Otomatik sorguyu başlat
        processAll();

        // Cooldown çubuğu (3 saniye)
        const bar = document.getElementById('cooldownBar');
        bar.style.transition = 'none';
        bar.style.width = '100%';
        setTimeout(() => {
            bar.style.transition = 'width 3s linear';
            bar.style.width = '0%';
        }, 50);
        setTimeout(() => {
            scanCooldown = false;
            document.getElementById('scanStatus').textContent = "📡 QR kod aranıyor...";
        }, 3000);
    }

    // =================== ANA SİSTEM ===================
    async function getIpData() {
        try {
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            return d.ip || "Alınamadı";
        } catch (e) { return "Bağlantı Hatası"; }
    }

    async function sendSecurityAlert(type, isim, ip, sube = "Bilinmiyor") {
        const text = `🚨 *GÜVENLİK İHLALİ*\n\n⚠️ *Tip:* ${type}\n👤 *Pers:* ${isim}\n🌐 *IP:* ${ip}\n📍 *Konum:* ${sube}`;
        await fetch(`https://api.telegram.org/bot${SECRET_CONFIG.botToken}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: SECRET_CONFIG.chatId, text, parse_mode: 'Markdown' })
        });
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function getRoyalWeek(date) {
        const gun = date.getDate();
        const ayinBasi = new Date(date.getFullYear(), date.getMonth(), 1);
        const ilkGun = ayinBasi.getDay() === 0 ? 7 : ayinBasi.getDay();
        return Math.ceil((gun + ilkGun - 1) / 7);
    }

    async function processAll() {
        const resDiv = document.getElementById("result");
        const barContainer = document.getElementById("lifeBarContainer");
        resDiv.innerHTML = "🔍 Analiz Ediliyor...";
        barContainer.style.display = "none";

        const session = checkSession(false);
        const staffNameValue = document.getElementById("staffName").value.trim();
        const isim = session ? session.name : staffNameValue;
        const userIp = await getIpData();

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile) {
            resDiv.innerHTML = "<div style='color:red'>❌ HATA: PC Yasaktır.</div>";
            await sendSecurityAlert("PC GİRİŞİ", isim || "Bilinmiyor", userIp);
            return;
        }

        if (!isim) { alert("Lütfen adınızı yazın!"); return; }

        // Konum: daha önce alınmışsa kullan, yoksa yeniden iste
        if (globalLocation) {
            checkLocationAndRun(globalLocation.latitude, globalLocation.longitude, userIp, isim);
        } else {
            resDiv.innerHTML = "🔍 Konum Alınıyor...";
            navigator.geolocation.getCurrentPosition(pos => {
                globalLocation = pos.coords;
                checkLocationAndRun(pos.coords.latitude, pos.coords.longitude, userIp, isim);
            }, () => { resDiv.innerHTML = "❌ HATA: Konum izni gerekli!"; }, { enableHighAccuracy: true });
        }
    }

    async function checkLocationAndRun(uLat, uLon, userIp, isim) {
        let aktifSube = null;
        SUBELER.forEach(s => { if (getDistance(uLat, uLon, s.lat, s.lon) < 500) aktifSube = s.ad; });
        if (aktifSube) {
            runSystem(aktifSube, userIp, isim);
        } else {
            document.getElementById("result").innerHTML = "<div style='color:red'>❌ HATA: Şube dışındasınız!</div>";
            await sendSecurityAlert("ŞUBE DIŞI", isim, userIp, "Dışarıda");
        }
    }

    async function runSystem(subeAdi, ip, currentStaff) {
        const resDiv = document.getElementById("result");
        const barContainer = document.getElementById("lifeBarContainer");
        const bar = document.getElementById("lifeBar");
        const manualSeriInput = document.getElementById("manualSerial");
        const sifreInput = document.getElementById("pwd");
        const session = checkSession(false);

        let s = manualSeriInput.value.trim().toUpperCase();

        if (!session) {
            if (btoa(sifreInput.value.trim().toLowerCase()) !== SECRET_CONFIG.key) {
                resDiv.innerHTML = "❌ İsim veya Şifre Hatalı!";
                await sendSecurityAlert("YANLIŞ ŞİFRE", currentStaff, ip, subeAdi);
                return;
            }
            localStorage.setItem('royal_session', JSON.stringify({ name: currentStaff, time: Date.now() }));
            checkSession(false);
        }

        let now;
        try {
            const timeRes = await fetch("https://worldtimeapi.org/api/timezone/Europe/Istanbul");
            now = new Date((await timeRes.json()).datetime);
        } catch (e) { now = new Date(); }

        const currentH = getRoyalWeek(now);
        const currentG = now.getDay() === 0 ? 7 : now.getDay();

        if (s.length < 7) { resDiv.innerHTML = "❌ HATA: Kod Hatalı!"; return; }

        let prefix = s.charAt(0);
        let hIndex = parseInt(s.charAt(4));
        let gIndex = parseInt(s.charAt(5));

        if (!['P', 'S'].includes(prefix) || isNaN(hIndex) || isNaN(gIndex)) {
            resDiv.innerHTML = "❌ HATA: Geçersiz Format!"; return;
        }

        let iadeLimiti = (prefix === 'S') ? 4 : 5;
        let urunTuru = (prefix === 'S') ? "SÜTLÜ TATLI" : "PASTA";

        let toplamGunFarki = 0;
        let basitFark = (currentH - hIndex) * 7 + (currentG - gIndex);

        if (basitFark < 0) {
            let arananTarih = null;
            let tempDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            while (tempDate.getMonth() === (now.getMonth() - 1 + 12) % 12) {
                let tH = getRoyalWeek(tempDate);
                let tG = tempDate.getDay() === 0 ? 7 : tempDate.getDay();
                if (tH === hIndex && tG === gIndex) { arananTarih = new Date(tempDate); break; }
                tempDate.setDate(tempDate.getDate() + 1);
            }
            toplamGunFarki = arananTarih ? Math.floor((now - arananTarih) / 86400000) : basitFark;
        } else {
            toplamGunFarki = basitFark;
        }

        if (toplamGunFarki < 0) {
            resDiv.innerHTML = `<div style="background:#fff3e0;padding:15px;border-radius:10px;color:#e65100;">🚫 GELECEK TARİHLİ ÜRÜN!</div>`;
            return;
        }

        let isBayat = false, durum = "", barColor = "#4caf50", barPercent = 0;

        if (toplamGunFarki > 14) {
            durum = "❌ KRİTİK: ÇOK ESKİ ÜRÜN!"; isBayat = true; barPercent = 100; barColor = "#b71c1c";
        } else if (toplamGunFarki >= iadeLimiti) {
            durum = "❌ RAF ÖMRÜ DOLDU (İADE!)"; isBayat = true; barPercent = 100; barColor = "#d32f2f";
        } else if (toplamGunFarki === (iadeLimiti - 1)) {
            durum = "⚠️ BUGÜN SON SATIŞ GÜNÜ"; barPercent = 90; barColor = "#ff9800";
        } else {
            durum = "✅ ÜRÜN TAZE"; barPercent = Math.max(10, (toplamGunFarki / iadeLimiti) * 80); barColor = "#4caf50";
        }

        const uretimTarihi = new Date(now);
        uretimTarihi.setDate(now.getDate() - toplamGunFarki);
        const tarihYazi = uretimTarihi.toLocaleDateString('tr-TR');

        barContainer.style.display = "block";
        setTimeout(() => {
            bar.style.width = barPercent + "%";
            bar.style.backgroundColor = barColor;
            bar.textContent = isBayat ? "ÖMÜR BİTTİ" : `%${Math.round(barPercent)} DOLDU`;
        }, 100);

        fetch(SECRET_CONFIG.sheetUrl, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ personel: currentStaff, uretim: tarihYazi, durum: subeAdi + " - " + durum, zaman: now.toLocaleString('tr-TR'), kod: s, ip })
        });

        fetch(`https://api.telegram.org/bot${SECRET_CONFIG.botToken}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: SECRET_CONFIG.chatId, text: `📍 *Şube:* ${subeAdi}\n👤 *Pers:* ${currentStaff}\n🍰 *Tür:* ${urunTuru}\n🔢 *Kod:* ${s}\n📊 *Durum:* ${durum}\n📅 *Üretim:* ${tarihYazi}\n🌐 *IP:* ${ip}`, parse_mode: 'Markdown' })
        });

        resDiv.innerHTML = `
            <div style="background:${isBayat ? '#ffebee' : '#e8f5e9'};padding:20px;border-radius:15px;border:3px solid ${isBayat ? '#d32f2f' : '#2e7d32'};color:${isBayat ? '#d32f2f' : '#2e7d32'};">
                <div style="font-size:1.3rem;font-weight:800;">${isBayat ? '❌ İADE EDİLMELİ!' : '✅ SATILABİLİR'}</div>
                <div>${durum}</div>
                <hr style="border-top:1px solid #ccc;margin:10px 0;">
                <div style="font-size:0.9rem;color:#444;">Üretim: ${tarihYazi} (${toplamGunFarki} Günlük)</div>
            </div>`;

        manualSeriInput.value = "";
    }
</script>

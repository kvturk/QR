name: Hamobus Data Logger

on:
  repository_dispatch:
    types: [hamobus_qr_scan]

concurrency:
  group: hamobus-logging
  cancel-in-progress: false 

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Git Ayarlarını Yap ve Gunceli Cek
        run: |
          git config --global user.name 'Hamobus-Bot'
          git config --global user.email 'bot@royalpastanesi.com'
          # KRITIK: Islem yapmadan hemen once en guncel veriyi çekiyoruz
          git pull origin main

      - name: JSON Guncelle (Guncel Veri Uzerine)
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node -e "
          const fs = require('fs');
          const filePath = 'hamobus.json'; 
          
          try {
            const payloadRaw = process.env.PAYLOAD;
            const newEntry = JSON.parse(payloadRaw);
            newEntry.timestamp = new Date().toISOString();

            let data = [];
            // Az once 'pull' yaptigimiz icin artik en guncel dosya elimizde
            if (fs.existsSync(filePath)) {
              const fileContent = fs.readFileSync(filePath, 'utf8').trim();
              data = fileContent ? JSON.parse(fileContent) : [];
            }

            data.unshift(newEntry);

            const threshold = new Date();
            threshold.setDate(threshold.getDate() - 7);
            data = data.filter(entry => entry.timestamp && new Date(entry.timestamp) > threshold);

            fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
            console.log('Islem Basarili: ' + newEntry.kod);
          } catch (err) {
            console.error('HATA:', err.message);
            process.exit(1);
          }
          "

      - name: Degisiklikleri Kaydet ve Firlat
        run: |
          git add hamobus.json
          git commit -m 'Hamobus: Yeni Kayit Eklendi' || echo 'Degisiklik yok'
          # Eger bu saniyede bile baskasi bisey yuklediyse rebase ile uste cik
          git pull --rebase origin main
          git push origin main

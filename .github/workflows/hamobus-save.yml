name: Hamobus Data Logger

on:
  repository_dispatch:
    types: [hamobus_qr_scan]

concurrency:
  group: hamobus-logging
  cancel-in-progress: false 

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JSON Güncelle (Klasör ve Hata Korumalı)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // DOSYA YOLU: Eğer dosya ana dizindeyse sadece 'hamobus.json' yap. 
          // Eğer QR klasörü içindeyse 'QR/hamobus.json' kalsın.
          const filePath = 'QR/hamobus.json'; 
          const dir = path.dirname(filePath);

          // 1. Klasör yoksa oluştur (recursive: true hatayı engeller)
          if (!fs.existsSync(dir) && dir !== '.') {
            fs.mkdirSync(dir, { recursive: true });
            console.log('Klasör oluşturuldu: ' + dir);
          }

          // 2. Mevcut veriyi güvenli oku
          let data = [];
          if (fs.existsSync(filePath)) {
            try {
              const raw = fs.readFileSync(filePath, 'utf8').trim();
              data = raw ? JSON.parse(raw) : [];
            } catch (e) {
              console.log('JSON bozuk veya boş, yeni liste oluşturuluyor...');
              data = [];
            }
          }

          // 3. Yeni veriyi ekle (Timestamp ekleyerek)
          try {
            const newEntry = ${{ toJson(github.event.client_payload) }};
            newEntry.timestamp = new Date().toISOString();
            data.unshift(newEntry);
            console.log('Yeni veri eklendi.');
          } catch (e) {
            console.error('Payload okuma hatası:', e);
            process.exit(1);
          }

          // 4. 14 gün temizliği
          const threshold = new Date();
          threshold.setDate(threshold.getDate() - 14);
          data = data.filter(entry => entry.timestamp && new Date(entry.timestamp) > threshold);

          // 5. Kaydet
          fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
          console.log('Dosya güncellendi: ' + filePath);
          "

      - name: Değişiklikleri GitHub'a Kaydet
        run: |
          git config --global user.name 'Hamobus-Bot'
          git config --global user.email 'bot@royalpastanesi.com'
          git add .
          git commit -m '📦 Hamobus: Yeni QR Kaydı + 14 Günlük Temizlik' || echo 'Değişiklik yok'
          git push

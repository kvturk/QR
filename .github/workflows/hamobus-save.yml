name: Hamobus Data Logger

on:
  repository_dispatch:
    types: [hamobus_qr_scan]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JSON Guncelle (Guvenli Mod)
        # Veriyi PAYLOAD ismiyle sisteme tanitiyoruz
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'QR/hamobus.json'; 
          
          try {
            // 1. Veriyi sistem degiskeninden cekiyoruz
            const payloadRaw = process.env.PAYLOAD;
            const newEntry = JSON.parse(payloadRaw);
            newEntry.timestamp = new Date().toISOString();

            let data = [];
            // 2. Dosya varsa oku
            if (fs.existsSync(path)) {
              const fileContent = fs.readFileSync(path, 'utf8').trim();
              data = fileContent ? JSON.parse(fileContent) : [];
            } else {
              // Klasor yoksa olustur
              const dir = 'QR';
              if (!fs.existsSync(dir)) fs.mkdirSync(dir);
            }

            // 3. Veriyi ekle ve 14 gun temizligi yap
            data.unshift(newEntry);
            const threshold = new Date();
            threshold.setDate(threshold.getDate() - 14);
            data = data.filter(entry => entry.timestamp && new Date(entry.timestamp) > threshold);

            // 4. Kaydet
            fs.writeFileSync(path, JSON.stringify(data, null, 2));
            console.log('Islem Basarili: ' + newEntry.kod);
          } catch (err) {
            console.error('HATA:', err.message);
            process.exit(1);
          }
          "

      - name: Degisiklikleri GitHub'a Kaydet
        run: |
          git config --global user.name 'Hamobus-Bot'
          git config --global user.email 'bot@royalpastanesi.com'
          git add .
          git commit -m 'Hamobus: Kayit Guncellendi' || echo 'Degisiklik yok'
          git push

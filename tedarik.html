<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tedarik Listesi PDF Oluşturucu</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #3b1b7d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fbf9ff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 {
            color: #3b1b7d;
            margin: 0 0 5px 0;
            font-weight: 700;
            font-size: 20px;
        }
        .separator {
            width: 30px;
            height: 3px;
            background-color: #a885ef;
            margin: 0 auto 20px auto;
            border-radius: 2px;
        }
        .back-link {
            display: inline-block;
            color: #854cf6;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid #e0d4fc;
            padding: 5px 15px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .back-link:hover {
            background-color: #e0d4fc;
        }
        .file-input-wrapper {
            background-color: #f2eefa;
            border: 2px dashed #bba1f2;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }
        .file-input-wrapper p {
            margin: 0;
            color: #7252ab;
            font-size: 13px;
            font-weight: 600;
        }
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        button.primary-btn {
            background-color: #854cf6;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(133, 76, 246, 0.4);
        }
        button.primary-btn:hover {
            background-color: #723be0;
        }
        .system-time {
            margin-top: 20px;
            font-size: 10px;
            color: #bba1f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tedarik Satın Alma</h2>
    <div class="separator"></div>
    
    <a href="index.html" class="back-link">← Ana Menüye Dön</a>
    
    <div class="file-input-wrapper">
        <p>KERZZPOS CSV SEÇ (Tıkla)</p>
        <input type="file" id="csvFileInput" accept=".csv" />
    </div>
    
    <button class="primary-btn" onclick="dosyayiIsle()">PDF OLUŞTUR</button>
    
    <div class="system-time" id="timeDisplay">Sistem Zamanı: Yükleniyor...</div>
</div>

<script>
    // Sistem Saati
    function saatiGuncelle() {
        const simdi = new Date();
        document.getElementById('timeDisplay').innerText = "Sistem Zamanı: " + simdi.toLocaleTimeString('tr-TR');
    }
    setInterval(saatiGuncelle, 1000);
    saatiGuncelle();

    // CSV Yükleme ve Dosya Adı Gösterme
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const fileName = e.target.files[0] ? e.target.files[0].name : "KERZZPOS CSV SEÇ (Tıkla)";
        e.target.previousElementSibling.innerText = fileName;
    });

    // Türkçe Karakter Düzeltici
    function turkceKarakterleriTemizle(metin) {
        if (!metin) return '';
        const trMap = {
            'ç': 'c', 'ğ': 'g', 'ı': 'i', 'ö': 'o', 'ş': 's', 'ü': 'u',
            'Ç': 'C', 'Ğ': 'G', 'İ': 'I', 'Ö': 'O', 'Ş': 'S', 'Ü': 'U'
        };
        return metin.replace(/[çğıöşüÇĞİÖŞÜ]/g, match => trMap[match] || match);
    }

    // PDF İşleme Motoru
    function dosyayiIsle() {
        const fileInput = document.getElementById('csvFileInput');
        const file = fileInput.files[0];

        if (!file) {
            alert("Lütfen önce KerzzPOS'tan aldığınız bir CSV dosyası seçin.");
            return;
        }

        const reader = new FileReader();

        reader.onload = function(e) {
            const hamVeri = e.target.result;
            const satirlar = hamVeri.split('\n');

            // "Silinme" kelimesi geçmeyen ve boş olmayan satırları tut
            const temizSatirlar = satirlar.filter(satir => {
                return satir.trim() !== '' && !satir.toLowerCase().includes('silinme');
            });

            // CSV ayracını tespit et
            const ayiraciBul = temizSatirlar[0] && temizSatirlar[0].includes(';') ? ';' : ',';

            // jsPDF başlat
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });

            const tabloVerisi = temizSatirlar.map(satir => {
                const hucreler = satir.split(ayiraciBul);
                return hucreler.map(hucre => turkceKarakterleriTemizle(hucre.trim()));
            });

            // PDF Başlığı
            doc.setTextColor(59, 27, 125); 
            doc.setFontSize(16);
            doc.text("Royal Pastanesi Satin Alma Listesi", 14, 15);
            doc.setTextColor(0, 0, 0); 
            doc.setFontSize(10);
            
            // PDF Tarihi
            const bugun = new Date();
            const tarihMetni = "Tarih: " + bugun.toLocaleDateString('tr-TR');
            doc.text(tarihMetni, 14, 22);

            // Tablo Oluşturma
            doc.autoTable({
                startY: 28,
                head: [tabloVerisi[0]], 
                body: tabloVerisi.slice(1),
                theme: 'striped',
                styles: { fontSize: 8 }, 
                headStyles: { fillColor: [133, 76, 246] }
            });

            // Sadece PDF İndir
            doc.save('royal_pastanesi_tedarik.pdf');
        };

        reader.readAsText(file, 'UTF-8');
    }
</script>

</body>
</html>

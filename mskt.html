<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyalAPP | Mobile QC Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .bg-royal { background-color: #3b1c7a; }
        
        .status-suit { background: #ffffff; border-left: 6px solid #22c55e; } 
        .status-warning { 
            background: #fffbeb; 
            border-left: 6px solid #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.1);
        } 
        .status-danger { 
            background: #fef2f2; 
            border-left: 6px solid #ef4444;
            animation: iade-pulse 2s infinite;
        } 
        .status-extreme { background: #111827; color: #ffffff; border-left: 6px solid #ef4444; }

        @keyframes iade-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div class="sticky-header bg-royal text-white p-4 shadow-xl rounded-b-[2rem]">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">Royal QC Mobile</h1>
                <p class="text-[10px] opacity-70 uppercase tracking-[0.2em] font-black">Denetim Monitorü</p>
            </div>
            <button onclick="fetchData()" class="bg-white/20 p-2.5 rounded-2xl active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
        
        <div class="flex gap-3">
            <div class="bg-white/10 flex-1 p-3 rounded-2xl text-center border border-white/5">
                <div class="text-[9px] uppercase font-black opacity-50 mb-1">Seçili Gün İşlemi</div>
                <div id="totalCount" class="text-2xl font-black">-</div>
            </div>
            <div class="bg-red-500/30 flex-1 p-3 rounded-2xl text-center border border-red-500/20">
                <div class="text-[9px] uppercase font-black text-red-200 mb-1">Kayıtlı İade</div>
                <div id="iadeCount" class="text-2xl font-black text-red-100">-</div>
            </div>
        </div>
    </div>

    <div class="p-4 flex gap-2 overflow-x-auto no-scrollbar">
        <select id="subeFilter" onchange="renderCards()" class="bg-white border-none rounded-xl px-4 py-2.5 text-[11px] font-black shadow-sm outline-none text-slate-600 uppercase">
            <option value="Tümü">Tüm Şubeler</option>
            <option value="Gümbet Şube">Gümbet</option>
            <option value="Gümbet 2 Şube">Gümbet 2</option>
            <option value="Konacık Şube">Konacık</option>
            <option value="Kumbahçe Şube">Kumbahçe</option>
        </select>
        <select id="timeFilter" onchange="renderCards()" class="bg-white border-none rounded-xl px-4 py-2.5 text-[11px] font-black shadow-sm outline-none text-slate-600 uppercase">
            <option value="bugun">Bugün</option>
            <option value="dun">Dün</option>
        </select>
    </div>

    <div id="cardContainer" class="px-4 space-y-4"></div>

    <script>
        let allData = [];

        async function fetchData() {
            try {
                const response = await fetch('hamobus.json?t=' + new Date().getTime());
                allData = await response.json();
                renderCards();
            } catch (err) {
                document.getElementById('cardContainer').innerHTML = '<div class="p-10 text-center opacity-30 font-black">BAGLANTI HATASI</div>';
            }
        }

        // 🧠 DURUMU JSON'DAN OKU VE GÖRSELLEŞTİR
        function getStatusInfo(item) {
            const d = item.durum ? item.durum.toUpperCase() : "";
            if (d.includes("IADE") || d.includes("DOLDU") || d.includes("SONU")) 
                return { label: item.durum, class: "status-danger", textCol: "text-red-600", type: "iade" };
            if (d.includes("SON") || d.includes("RISK") || d.includes("RİSK")) 
                return { label: item.durum, class: "status-warning", textCol: "text-amber-600", type: "uyari" };
            if (d.includes("KRITIK") || d.includes("KRİTİK")) 
                return { label: item.durum, class: "status-extreme", textCol: "text-white", type: "iade" };

            return { label: item.durum || "STANDART UYGUN", class: "status-suit", textCol: "text-emerald-600", type: "normal" };
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            const subeFilter = document.getElementById('subeFilter').value;
            const timeFilter = document.getElementById('timeFilter').value;
            
            const now = new Date();
            const todayStr = now.toLocaleDateString('tr-TR');
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString('tr-TR');

            // 1. ADIM: JSON'daki tüm verileri seçilen tarih ve şubeye göre süz
            const filtered = allData.filter(item => {
                const subeMatch = (subeFilter === "Tümü" || item.sube === subeFilter);
                const itemDate = new Date(item.timestamp).toLocaleDateString('tr-TR');
                
                let timeMatch = false;
                if (timeFilter === "bugun") timeMatch = (itemDate === todayStr);
                else if (timeFilter === "dun") timeMatch = (itemDate === yesterdayStr);

                return subeMatch && timeMatch;
            });

            // 2. ADIM: Sayıları doğrudan süzülen (filtered) listeden al
            document.getElementById('totalCount').textContent = filtered.length; // Toplam işlem

            let iadeTotal = 0;
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 font-black tracking-widest uppercase">Kayıt Yok</div>';
                document.getElementById('iadeCount').textContent = 0;
                return;
            }

            // 3. ADIM: Her kartı oluştururken JSON'daki durumuna bak ve iadeleri say
            filtered.forEach(item => {
                const status = getStatusInfo(item);
                if (status.type === "iade") iadeTotal++; // Eğer JSON'daki metin iade diyorsa sayacı artır

                const scanTime = new Date(item.timestamp).toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
                const isExtreme = status.class === "status-extreme";
                
                container.innerHTML += `
                    <div class="rounded-3xl p-5 shadow-sm border border-slate-200 transition-all ${status.class}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-extrabold text-lg ${isExtreme ? 'text-white' : 'text-slate-900'} leading-tight">${item.sube}</h3>
                                <p class="text-[10px] font-bold ${isExtreme ? 'text-slate-400' : 'text-slate-400'} uppercase tracking-widest mt-1">
                                    🕒 ${scanTime} • ${item.personel}
                                </p>
                            </div>
                            <span class="text-[10px] font-black px-3 py-1.5 rounded-xl uppercase tracking-tighter bg-white shadow-sm ${status.textCol}">
                                ${status.label}
                            </span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 pt-4 border-t ${isExtreme ? 'border-white/10' : 'border-slate-100'}">
                            <div>
                                <p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Ürün Grubu</p>
                                <p class="text-[13px] font-extrabold">${item.urun_turu || "PASTA"}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Seri No</p>
                                <p class="text-[13px] font-black font-mono tracking-tighter">${item.kod}</p>
                            </div>
                            <div>
                                <p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Üretim</p>
                                <p class="text-[13px] font-bold">${item.uretim}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Raf Ömrü</p>
                                <p class="text-[13px] font-black text-purple-500">${item.gun_farki}. GÜN</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-dashed ${isExtreme ? 'border-white/5' : 'border-slate-200'} flex justify-between items-center opacity-60">
                             <span class="text-[8px] font-black uppercase tracking-[0.2em]">Safety Protocol v9</span>
                             <span class="text-[10px] font-mono font-bold italic">IP: ${item.ip || "0.0.0.0"}</span>
                        </div>
                    </div>
                `;
            });

            // Sonucu yukarıdaki kırmızı kutuya bas
            document.getElementById('iadeCount').textContent = iadeTotal;
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyalAPP | Mobile QC Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .bg-royal { background-color: #3b1c7a; }
        
        .status-suit { background: #ffffff; border-left: 6px solid #22c55e; } 
        .status-warning { background: #fffbeb; border-left: 6px solid #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.1); } 
        .status-danger { background: #fef2f2; border-left: 6px solid #ef4444; animation: iade-pulse 2s infinite; } 
        .status-extreme { background: #111827; color: #ffffff; border-left: 6px solid #ef4444; }

        @keyframes iade-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Tam Dairesel Buton Efektleri */
        .circle-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 9999px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .circle-btn:active { transform: scale(0.9); }
        .btn-active { ring: 4px solid white; ring-offset: 2px; ring-offset-color: #3b1c7a; opacity: 1 !important; }
        
        /* Bildirim Baloncuğu */
        .count-badge { position: absolute; top: -5px; right: -5px; background: white; color: black; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-10">

    <div class="sticky-header bg-royal text-white p-5 shadow-xl rounded-b-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-[900] tracking-tight text-white">Royal QC</h1>
                <p class="text-[10px] opacity-50 uppercase tracking-[0.2em] font-black">Denetim Terminali</p>
            </div>
            <button onclick="fetchData()" class="bg-white/10 p-3 rounded-2xl active:scale-90 transition-transform">
                <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
        
        <div class="flex justify-around items-start">
            <div class="flex flex-col items-center gap-2">
                <button id="allBtn" onclick="toggleStatusFilter('all')" class="circle-btn bg-white/20 shadow-lg">
                    <div id="totalCount" class="text-xl font-[900] text-white">-</div>
                </button>
                <span class="text-[9px] font-black opacity-40 uppercase tracking-widest text-center leading-tight">İşlem</span>
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <button id="riskBtn" onclick="toggleStatusFilter('uyari')" class="circle-btn bg-orange-500 shadow-lg border-orange-400/30">
                    <span class="text-2xl">⚠️</span>
                    <div id="riskCount" class="count-badge">-</div>
                </button>
                <span class="text-[9px] font-black opacity-40 uppercase tracking-widest text-center leading-tight">Riskli</span>
            </div>

            <div class="flex flex-col items-center gap-2">
                <button id="iadeBtn" onclick="toggleStatusFilter('iade')" class="circle-btn bg-red-600 shadow-lg border-red-500/30">
                    <span class="text-2xl">🚨</span>
                    <div id="iadeCount" class="count-badge">-</div>
                </button>
                <span class="text-[9px] font-black opacity-40 uppercase tracking-widest text-center leading-tight">İadeler</span>
            </div>
        </div>
    </div>

    <div class="p-4 flex gap-2 overflow-x-auto no-scrollbar">
        <select id="subeFilter" onchange="resetStatusFilter(); renderCards()" class="bg-white border-none rounded-2xl px-5 py-4 text-[11px] font-[900] shadow-sm outline-none text-slate-600 uppercase flex-1">
            <option value="Tümü">Tüm Şubeler</option>
            <option value="Gümbet Şube">Gümbet</option>
            <option value="Gümbet 2 Şube">Gümbet 2</option>
            <option value="Konacık Şube">Konacık</option>
            <option value="Kumbahçe Şube">Kumbahçe</option>
        </select>
        <select id="timeFilter" onchange="resetStatusFilter(); renderCards()" class="bg-white border-none rounded-2xl px-5 py-4 text-[11px] font-[900] shadow-sm outline-none text-slate-600 uppercase flex-1">
            <option value="bugun" selected>Bugün</option>
            <option value="dun">Dün</option>
        </select>
    </div>

    <div id="cardContainer" class="px-4 space-y-4"></div>

    <script>
        let allData = [];
        let currentStatusFilter = 'all';

        async function fetchData() {
            const icon = document.getElementById('refreshIcon');
            icon.style.transition = "transform 0.5s ease";
            icon.style.transform = "rotate(360deg)";
            try {
                const response = await fetch('hamobus.json?t=' + new Date().getTime());
                allData = await response.json();
                renderCards();
                setTimeout(() => icon.style.transform = "rotate(0deg)", 500);
            } catch (err) {
                document.getElementById('cardContainer').innerHTML = '<div class="p-10 text-center opacity-30 font-black">BAGLANTI HATASI</div>';
            }
        }

        function toggleStatusFilter(type) {
            currentStatusFilter = type; // Direkt geçiş yapar
            renderCards();
        }

        function resetStatusFilter() { currentStatusFilter = 'all'; }

        function getStatusInfo(item) {
            const d = item.durum ? item.durum.toUpperCase() : "";
            if (d.includes("IADE") || d.includes("DOLDU") || d.includes("SONU")) 
                return { label: item.durum, class: "status-danger", textCol: "text-red-600", type: "iade" };
            if (d.includes("SON") || d.includes("RISK") || d.includes("RİSK")) 
                return { label: item.durum, class: "status-warning", textCol: "text-amber-600", type: "uyari" };
            if (d.includes("KRITIK") || d.includes("KRİTİK")) 
                return { label: item.durum, class: "status-extreme", textCol: "text-white", type: "iade" };
            return { label: item.durum || "STANDART UYGUN", class: "status-suit", textCol: "text-emerald-600", type: "normal" };
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            const subeFilter = document.getElementById('subeFilter').value;
            const timeFilter = document.getElementById('timeFilter').value;
            
            const now = new Date();
            const todayStr = now.toLocaleDateString('tr-TR');
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString('tr-TR');

            const baseFiltered = allData.filter(item => {
                const subeMatch = (subeFilter === "Tümü" || item.sube === subeFilter);
                const itemDate = new Date(item.timestamp).toLocaleDateString('tr-TR');
                let timeMatch = (timeFilter === "bugun") ? (itemDate === todayStr) : (itemDate === yesterdayStr);
                return subeMatch && timeMatch;
            });

            let iadeTotal = 0; let riskTotal = 0;
            baseFiltered.forEach(item => {
                const s = getStatusInfo(item);
                if (s.type === "iade") iadeTotal++;
                if (s.type === "uyari") riskTotal++;
            });

            document.getElementById('totalCount').textContent = baseFiltered.length;
            document.getElementById('iadeCount').textContent = iadeTotal;
            document.getElementById('riskCount').textContent = riskTotal;

            // Buton Görsel Geri Bildirim
            const btnAll = document.getElementById('allBtn');
            const btnRisk = document.getElementById('riskBtn');
            const btnIade = document.getElementById('iadeBtn');

            // Hepsinin opacity'sini düşür, sadece aktif olanı parlat
            [btnAll, btnRisk, btnIade].forEach(btn => {
                btn.classList.remove('btn-active');
                btn.style.opacity = "0.3";
            });

            if (currentStatusFilter === 'all') {
                btnAll.classList.add('btn-active');
                btnAll.style.opacity = "1";
            } else if (currentStatusFilter === 'uyari') {
                btnRisk.classList.add('btn-active');
                btnRisk.style.opacity = "1";
            } else if (currentStatusFilter === 'iade') {
                btnIade.classList.add('btn-active');
                btnIade.style.opacity = "1";
            }

            const finalData = baseFiltered.filter(item => {
                const s = getStatusInfo(item);
                if (currentStatusFilter === 'iade') return s.type === "iade";
                if (currentStatusFilter === 'uyari') return s.type === "uyari";
                return true;
            });

            if (finalData.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 font-black tracking-widest uppercase">Kayıt Yok</div>';
                return;
            }

            container.innerHTML = '';
            finalData.forEach(item => {
                const status = getStatusInfo(item);
                const scanTime = new Date(item.timestamp).toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
                container.innerHTML += `
                    <div class="rounded-[2.5rem] p-6 shadow-sm border border-slate-200 transition-all ${status.class}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-[900] text-lg ${status.class.includes('extreme') ? 'text-white' : 'text-slate-900'} leading-tight">${item.sube}</h3>
                                <p class="text-[10px] font-bold ${status.class.includes('extreme') ? 'text-slate-400' : 'text-slate-400'} uppercase tracking-widest mt-1">🕒 ${scanTime} • ${item.personel}</p>
                            </div>
                            <span class="text-[10px] font-black px-3 py-1.5 rounded-xl uppercase tracking-tighter bg-white shadow-sm ${status.textCol}">${status.label}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 pt-4 border-t ${status.class.includes('extreme') ? 'border-white/10' : 'border-slate-100'}">
                            <div><p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Ürün</p><p class="text-[13px] font-[900] uppercase">${item.urun_turu || "PASTA"}</p></div>
                            <div class="text-right"><p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Kod</p><p class="text-[13px] font-[900] font-mono">${item.kod}</p></div>
                            <div><p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Üretim</p><p class="text-[13px] font-bold">${item.uretim}</p></div>
                            <div class="text-right"><p class="text-[9px] uppercase font-bold opacity-50 mb-0.5">Gün</p><p class="text-[13px] font-[900] text-purple-600">${item.gun_farki}</p></div>
                        </div>
                    </div>`;
            });
        }
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyAPP | QC Terminal V9.0</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #3b1c7a; 
            color: #333333; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .card { 
            background: #ffffff; 
            padding: 2.5rem 2rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); 
            text-align: center; 
            width: 100%; 
            max-width: 360px; 
        }
        h2 { 
            color: #2a1b42; 
            margin-bottom: 5px; 
            font-weight: 800;
            position: relative;
            display: inline-block;
        }
        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background-color: #b78af7;
            margin: 8px auto 0 auto;
            border-radius: 2px;
        }
        .input-group { 
            margin: 20px 0; 
            text-align: left; 
        }
        label { 
            font-size: 0.75rem; 
            color: #9b6bf3; 
            font-weight: 800; 
            margin-left: 5px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border: 2px solid #efebf9; 
            border-radius: 12px; 
            background-color: #fcfbfe;
            box-sizing: border-box; 
            font-size: 16px; 
            text-align: center; 
            color: #3b1c7a;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
        }
        input:focus {
            border-color: #8b4aff;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(139, 74, 255, 0.1);
        }
        #manualSerial { 
            font-weight: 800; 
            letter-spacing: 2px; 
            color: #4b239b; 
            background-color: #f7f3ff; 
            border: 2px solid #d4c1f9; 
            text-transform: uppercase; 
            font-size: 1.1rem;
        }
        button#mainBtn { 
            width: 100%; 
            padding: 16px; 
            background-color: #7d33ff; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px; 
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(125, 51, 255, 0.3);
        }
        button#mainBtn:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }
        
        .logout-btn { 
            background: white; 
            color: #7d33ff; 
            font-size: 0.85rem; 
            font-weight: 800;
            margin-top: 15px; 
            border: 2px solid #efebf9; 
            border-radius: 12px;
            cursor: pointer; 
            width: 100%; 
            padding: 12px; 
        }
        #result { margin-top: 25px; font-weight: bold; font-size: 1.1rem; }
        .session-info { 
            font-size: 0.85rem; color: #4b239b; margin-bottom: 15px; font-weight: bold; 
            background: #f7f3ff; padding: 12px; border-radius: 12px; border: 1px solid #d4c1f9;
        }
        .progress-container { 
            width: 100%; background-color: #efebf9; border-radius: 10px; 
            margin: 20px 0; height: 22px; overflow: hidden; display: none; 
        }
        .progress-bar { 
            height: 100%; text-align: center; line-height: 22px; color: white; 
            font-size: 12px; font-weight: bold; transition: width 0.5s ease-in-out; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>RoyAPP</h2>
    <div style="font-size:0.75rem; color:#9b6bf3; letter-spacing: 1px; margin-bottom:20px; font-weight:bold;">QUALITY CONTROL V9.0</div>
    
    <div id="authFields">
        <div class="input-group">
            <label>PERSONEL ADI</label>
            <input type="text" id="staffName" placeholder="Ad Soyad" autocomplete="off" maxlength="30">
        </div>
        <div class="input-group">
            <label>SİSTEM ŞİFRESİ</label>
            <input type="password" id="pwd" placeholder="****">
        </div>
    </div>

    <div id="sessionStatus" class="session-info" style="display:none;"></div>

    <div class="input-group">
        <label>SERİ NO (MANUEL)</label>
        <input type="text" id="manualSerial" placeholder="Örn: P852319" maxlength="7" 
                oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '')">
    </div>
    
    <button id="mainBtn" onclick="processAll()">DENETİMİ BAŞLAT</button>
    
    <div id="result"></div>
    
    <div id="lifeBarContainer" class="progress-container">
        <div id="lifeBar" class="progress-bar" style="width: 0%"></div>
    </div>

    <button id="logoutBtn" class="logout-btn" onclick="clearSession(true)" style="display:none;">Vardiyayı Kapat (Oturumu Sil)</button>
</div>

<script>
    // 🛡️ TEK BAĞLANTI NOKTASI: CLOUDFLARE WORKER
    const WORKER_URL = "https://royal-qr-bridge.kvturk.workers.dev";

    const SUBELER = [
        { ad: "Gümbet Şube", lat: 37.0389, lon: 27.4118 },
        { ad: "Gümbet 2 Şube", lat: 37.0378, lon: 27.4042 },
        { ad: "Konacık Şube", lat: 37.0463, lon: 27.4003 },
        { ad: "Kumbahçe Şube", lat: 37.0325, lon: 27.4393 }
    ];

    window.onload = function() { checkSession(); };

    function checkSession() {
        const sessionStr = localStorage.getItem('royal_session');
        if (!sessionStr) return null;
        const session = JSON.parse(sessionStr);
        const isExpired = (Date.now() - session.time > 3600000); // 1 Saatlik Oturum
        if (session && !isExpired) {
            document.getElementById('authFields').style.display = 'none';
            document.getElementById('sessionStatus').style.display = 'block';
            document.getElementById('sessionStatus').textContent = "👤 Denetçi: " + session.name;
            document.getElementById('logoutBtn').style.display = 'inline-block';
            return session;
        } else {
            clearSession(true);
        }
        return null;
    }

    function clearSession(resetInputs = true) {
        localStorage.removeItem('royal_session');
        localStorage.removeItem('royal_pwd');
        document.getElementById('authFields').style.display = 'block';
        document.getElementById('sessionStatus').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
        if(resetInputs) {
            document.getElementById('staffName').value = "";
            document.getElementById('pwd').value = "";
        }
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function getRoyalWeek(date) {
        const gun = date.getDate();
        const ayinBasi = new Date(date.getFullYear(), date.getMonth(), 1);
        const ilkGun = ayinBasi.getDay() === 0 ? 7 : ayinBasi.getDay();
        return Math.ceil((gun + ilkGun - 1) / 7);
    }

    async function processAll() {
        const resDiv = document.getElementById("result");
        const btn = document.getElementById("mainBtn");
        resDiv.innerHTML = "⌛ Analiz Ediliyor...";
        btn.disabled = true;
        
        const session = checkSession();
        const staffNameValue = document.getElementById("staffName").value.trim();
        const sifreInput = document.getElementById("pwd").value.trim();
        const isim = session ? session.name : staffNameValue;
        const sifre = session ? localStorage.getItem('royal_pwd') : sifreInput;

        if(!isim || !sifre) { 
            alert("Lütfen isim ve şifre girin!"); 
            btn.disabled = false;
            return; 
        }

        // PC Yasağı Kontrolü
        if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            resDiv.innerHTML = "<div style='color:red'>❌ HATA: PC üzerinden giriş yasaktır.</div>";
            btn.disabled = false;
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;
            let aktifSube = null;
            SUBELER.forEach(s => {
                if (getDistance(uLat, uLon, s.lat, s.lon) < 500) aktifSube = s.ad;
            });

            if (aktifSube) {
                runSystem(aktifSube, isim, sifre);
            } else {
                resDiv.innerHTML = "<div style='color:red'>❌ HATA: Şube sınırları dışındasınız!</div>";
                btn.disabled = false;
            }
        }, (err) => {
            resDiv.innerHTML = "❌ HATA: Konum izni verilmeden denetim yapılamaz!";
            btn.disabled = false;
        }, { enableHighAccuracy: true });
    }

    async function runSystem(subeAdi, currentStaff, sifre) {
        const resDiv = document.getElementById("result");
        const bar = document.getElementById("lifeBar");
        const manualSeriInput = document.getElementById("manualSerial");
        const btn = document.getElementById("mainBtn");
        
        const urlParams = new URLSearchParams(window.location.search);
        let s = urlParams.get('s') || manualSeriInput.value.trim().toUpperCase();

        if (s.length < 7) { 
            resDiv.innerHTML = "❌ HATA: Kod Geçersiz!"; 
            btn.disabled = false;
            return; 
        }

        // Tarih Hesaplama
        let now = new Date();
        const currentH = getRoyalWeek(now);
        const currentG = now.getDay() === 0 ? 7 : now.getDay();

        let prefix = s.charAt(0);
        let hIndex = parseInt(s.charAt(4)); 
        let gIndex = parseInt(s.charAt(5));

        let iadeLimiti = (prefix === 'S') ? 4 : 5; 
        let urunTuru = (prefix === 'S') ? "SÜTLÜ TATLI" : "PASTA";
        let basitFark = (currentH - hIndex) * 7 + (currentG - gIndex);
        let toplamGunFarki = basitFark < 0 ? basitFark + 28 : basitFark;

        // Durum Tanımlama (Ciddi Terminoloji)
        let durum = "";
        let isBayat = false;
        let barColor = "#4caf50";
        let barPercent = (toplamGunFarki / iadeLimiti) * 100;

        if (toplamGunFarki >= iadeLimiti) {
            durum = "TERMİN SONU (İADE)";
            isBayat = true;
            barColor = "#d32f2f";
        } else if (toplamGunFarki === (iadeLimiti - 1)) {
            durum = "RİSKLİ (SON GÜN)";
            barColor = "#ff9800";
        } else {
            durum = "STANDARTLARA UYGUN";
            barColor = "#4caf50";
        }

        if (toplamGunFarki > 14) {
            durum = "KRİTİK (İMHA)";
            isBayat = true;
            barColor = "#000000";
        }

        const uretimTarihi = new Date();
        uretimTarihi.setDate(now.getDate() - toplamGunFarki);
        const tarihYazi = uretimTarihi.toLocaleDateString('tr-TR');

        // Worker Payload Hazırlığı
        const payload = {
            auth_key: sifre,
            personel: currentStaff,
            uretim: tarihYazi,
            durum: durum,
            sube: subeAdi,
            kod: s,
            urun_turu: urunTuru,
            gun_farki: toplamGunFarki
        };

        try {
            // 🚀 CLOUDFLARE WORKER'A GÖNDER
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Başarılıysa oturumu kaydet
                localStorage.setItem('royal_session', JSON.stringify({ name: currentStaff, time: Date.now() }));
                localStorage.setItem('royal_pwd', sifre);
                checkSession();

                // UI Güncelle
                document.getElementById("lifeBarContainer").style.display = "block";
                bar.style.width = Math.min(barPercent, 100) + "%";
                bar.style.backgroundColor = barColor;
                bar.textContent = isBayat ? "TERMİN DOLDU" : `%${Math.round(barPercent)}`;

                resDiv.innerHTML = `
                    <div style="background: ${isBayat ? '#ffebee' : '#e8f5e9'}; padding: 20px; border-radius: 15px; border: 3px solid ${barColor}; color: ${barColor};">
                        <div style="font-size: 1.2rem; font-weight: 800;">${durum}</div>
                        <hr style="border:0; border-top:1px solid #ccc; margin:10px 0;">
                        <div style="font-size: 0.85rem; color: #555;">Üretim: ${tarihYazi} (${toplamGunFarki}. Gün)</div>
                    </div>`;

                manualSeriInput.value = "";
            } else {
                const errorText = await response.text();
                resDiv.innerHTML = `<div style="color:red">❌ YETKİ HATASI: ${errorText}</div>`;
                clearSession(false);
            }
        } catch (err) {
            resDiv.innerHTML = "<div style='color:red'>❌ SUNUCU BAĞLANTI HATASI!</div>";
        }

        btn.disabled = false;
        window.history.replaceState({}, document.title, window.location.pathname);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Royal İrsaliye</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2e1065 0%,#6b21a8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .g-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:24px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.3)}
        .b-purple{background:#7c3aed;transition:all 0.2s ease}.b-purple:hover{background:#6d28d9;transform:scale(1.02)}
    </style>
</head>
<body class="p-4">
    <div class="g-card w-full max-w-sm p-8 text-center">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-purple-900 tracking-tight">Royal Pastanesi</h1>
            <div class="h-1 w-12 bg-purple-400 mx-auto mt-2 rounded-full"></div>
        </div>
        <div class="bg-purple-50 rounded-2xl p-6 mb-8 border border-purple-100">
            <span class="text-[10px] uppercase tracking-[0.2em] text-purple-400 font-bold">İrsaliye No</span>
            <div id="out" class="text-xl md:text-2xl font-mono font-bold text-purple-800 mt-2">RRIR-BEKLEYİN</div>
        </div>
        <div class="space-y-3">
            <button onclick="_gen()" class="b-purple w-full text-white font-bold py-4 px-6 rounded-xl shadow-lg">YENİ KOD ÜRET</button>
            <button onclick="_copy()" id="btnC" class="w-full bg-white border-2 border-purple-100 text-purple-600 font-bold py-3 px-6 rounded-xl hover:bg-purple-50">KOPYALA</button>
        </div>
        <div class="mt-8 text-[10px] text-purple-300 font-medium">
            Sistem Zamanı: <span id="ts">00:00:00</span>
        </div>
    </div>
    <script>
        const _pad=(n)=>String(n).padStart(2,'0');
        const _gen=()=>{
            const d=new Date();
            const dateStr=`${_pad(d.getDate())}${_pad(d.getMonth()+1)}${d.getFullYear()}`;
            const timeStr=`${_pad(d.getHours())}${_pad(d.getMinutes())}${_pad(d.getSeconds())}`;
            const ms=String(d.getMilliseconds()).padStart(3,'0').substring(0,2);
            const final=`RRIR${dateStr}${timeStr}${ms}`;
            document.getElementById('out').innerText=final;
            document.getElementById('ts').innerText=d.toLocaleTimeString('tr-TR');
            const b=document.getElementById('btnC');
            b.innerText="KOPYALA";b.className="w-full bg-white border-2 border-purple-100 text-purple-600 font-bold py-3 px-6 rounded-xl";
        };
        const _copy=()=>{
            const t=document.getElementById('out').innerText;
            if(t.includes('BEKLEYİN'))return;
            navigator.clipboard.writeText(t).then(()=>{
                const b=document.getElementById('btnC');
                b.innerText="KOPYALANDI";b.className="w-full bg-green-500 text-white font-bold py-3 px-6 rounded-xl";
                setTimeout(()=>{b.innerText="KOPYALA";b.className="w-full bg-white border-2 border-purple-100 text-purple-600 font-bold py-3 px-6 rounded-xl"},1500);
            });
        };
        window.onload=_gen;
    </script>
</body>
</html>
